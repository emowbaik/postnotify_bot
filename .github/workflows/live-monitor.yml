name: PostNotify Live Monitor

on:
  # ── Manual start (first time / restart after loop dies) ──────────────────
  workflow_dispatch:

  # ── Daily safety restart: ensures loop auto-revives if it ever dies ───────
  # Runs at 00:00 UTC every day
  schedule:
    - cron: '0 0 * * *'

  # ── Self-trigger: the loop fires this event at the end of each run ────────
  repository_dispatch:
    types: [tiktok-live-check]

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Prevent overlapping runs — only one instance at a time.
    # New run cancels the previous one to avoid duplicate notifications.
    concurrency:
      group: live-monitor
      cancel-in-progress: true

    permissions:
      contents: write   # needed to commit state.json back to the repo
      actions: write    # needed to delete old workflow runs

    env:
      DISCORD_BOT_TOKEN:          ${{ secrets.DISCORD_BOT_TOKEN }}
      TIKTOK_DISCORD_CHANNEL_ID:  ${{ secrets.TIKTOK_DISCORD_CHANNEL_ID }}
      TIKTOK_DISCORD_MENTION:    ${{ secrets.TIKTOK_DISCORD_MENTION }}
      TIKTOK_USERNAMES:           ${{ secrets.TIKTOK_USERNAMES }}
      YOUTUBE_CHANNEL_IDS:        ${{ secrets.YOUTUBE_CHANNEL_IDS }}
      YOUTUBE_DISCORD_CHANNEL_ID: ${{ secrets.YOUTUBE_DISCORD_CHANNEL_ID }}
      YOUTUBE_DISCORD_MENTION:    ${{ secrets.YOUTUBE_DISCORD_MENTION }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch || 'master' }}
          fetch-depth: 0
          persist-credentials: true

      # ── 2. Setup Bun runtime ─────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          version: '1.x'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Debug YouTube detector
        run: |
          bun -e "import { checkYouTubeLive } from './src/youtube/checkLive.ts'; console.log(await checkYouTubeLive('UCSJ4gkVC6NrvII8umztf0Ow'))"

      - name: Debug YouTube channel hash
        run: |
          bun -e "const id = process.env.YOUTUBE_CHANNEL_IDS.trim(); const hash = new Bun.CryptoHasher('sha256').update(id).digest('hex'); console.log({ length: id.length, hash });"

      - name: Debug YouTube detector literal
        run: |
          bun -e "import { checkYouTubeLive } from './src/youtube/checkLive.ts'; console.log(await checkYouTubeLive('UCSJ4gkVC6NrvII8umztf0Ow'))"

      - name: Debug YouTube response shape
        run: |
          bun -e "
            const id = process.env.YOUTUBE_CHANNEL_IDS.trim();
            const video = 'VAlMDl00mYY';
            const url = \`https://www.youtube.com/channel/\${id}/live\`;
      
            const response = await fetch(url, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36',
                'Accept': 'text/html',
                'Accept-Language': 'en-US,en;q=0.9'
              }
            });
      
            const html = await response.text();
            console.log({
              status: response.status,
              finalUrl: response.url,
              length: html.length,
              hasInitialData: html.includes('ytInitialData'),
              hasPlayerResponse: html.includes('ytInitialPlayerResponse'),
              hasVideoId: html.includes(video),
              hasWatchUrl: html.includes('/watch?v=' + video),
              hasConsent: /consent\.youtube|Before you continue/i.test(html),
              hasChallenge: /unusual traffic|captcha/i.test(html),
              title: html.match(/<title>([^<]*)<\/title>/i)?.[1]
            });
          "

      - name: Debug watch page shape
        run: |
          bun -e "
            const id = process.env.YOUTUBE_CHANNEL_IDS.trim();
            const channelUrl = 'https://www.youtube.com/channel/' + id + '/live';
            const ch = await fetch(channelUrl, { headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36', 'Accept-Language': 'en-US,en;q=0.9' } });
            const html = await ch.text();
            const videoIds = new Set();
            for (const m of html.matchAll(/[?&]v=([\w-]{11})/g)) videoIds.add(m[1]);
            for (const m of html.matchAll(/\"videoId\"\s*:\s*\"([\w-]{11})\"/g)) videoIds.add(m[1]);
            for (const m of html.matchAll(/\"watchEndpoint\"\s*:\s*\{[^}]*\"videoId\"\s*:\s*\"([\w-]{11})\"/g)) videoIds.add(m[1]);
            const candidates = [...videoIds].slice(0, 3);
            console.log('channel page video IDs:', candidates);
            for (const vid of candidates) {
              const wr = await fetch('https://www.youtube.com/watch?v=' + vid, { headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36', 'Accept-Language': 'en-US,en;q=0.9' } });
              const wh = await wr.text();
              console.log({ vid, status: wr.status, length: wh.length, hasPlayer: wh.includes('ytInitialPlayerResponse'), isLiveNow: /\"isLiveNow\"\s*:\s*true/.test(wh), isLive: /\"isLive\"\s*:\s*true/.test(wh), hasChallenge: /unusual traffic|captcha/i.test(wh), title: wh.match(/<title>([^<]*)<\/title>/i)?.[1] });
            }
          "

      - name: Debug watch page player response fields
        run: |
          bun -e "
            const vid = 'VAlMDl00mYY';
            const r = await fetch('https://www.youtube.com/watch?v=' + vid, {
              headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36', 'Accept-Language': 'en-US,en;q=0.9' }
            });
            const html = await r.text();
            const m = html.match(/ytInitialPlayerResponse\s*=\s*(\{)/);
            if (!m) { console.log('no player response'); process.exit(1); }
            let d=0, s=false, e=false, i=m.index+m[0].length-1;
            for (; i < html.length; i++) {
              const c = html[i];
              if (s) { if (e) e=false; else if (c==='\\\\') e=true; else if (c==='\"') s=false; continue; }
              if (c==='\"') s=true; else if (c==='{') d++; else if (c==='}' && --d===0) break;
            }
            const player = JSON.parse(html.slice(m.index+m[0].length-1, i+1));
            const vd = player?.videoDetails ?? {};
            const micro = player?.microformat?.playerMicroformatRenderer ?? {};
            const live = micro?.liveBroadcastDetails ?? {};
            console.log({ isLive: vd.isLive, isLiveContent: vd.isLiveContent, hasStreamingData: !!player.streamingData, isLiveNow: live.isLiveNow, hasEndTimestamp: !!live.endTimestamp, startTimestamp: live.startTimestamp });
          "

      # ── 4. Run the live check & notify ───────────────────────────────────
      - name: Check live status & send notifications
        run: bun run src/app.ts

      # ── 5. Commit state.json if it changed ───────────────────────────────
      - name: Commit state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          if ! git diff --cached --quiet -- state.json; then
            git commit -m "chore: sync state.json [skip ci]" state.json
            git push
          else
            echo "No state changes to commit."
          fi

      # ── 6. Delete old workflow runs (keep only the latest) ───────────────
      # Keeps the Actions tab clean — same pattern as Auto-checkin-iamhc.
      - name: Clear old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "Deleting old run: $run_id"
              gh run delete $run_id || true
            fi
          done
          echo "✅ Cleanup done — only latest run kept."

      # ── 7. Sleep 300 seconds before triggering next loop ─────────────────
      # This creates an approximately 5-minute polling interval.
      - name: Wait before next check
        run: |
          echo "Sleeping 300 seconds before triggering next check..."
          sleep 300

      # ── 7. Self-trigger: fire the next loop iteration ────────────────────
      # Uses LOOP_TOKEN (a GitHub PAT with repo scope) because GITHUB_TOKEN
      # cannot trigger new workflow runs to prevent accidental infinite loops.
      - name: Trigger next loop iteration
        if: always()   # fire even if earlier steps fail, so the loop never dies
        env:
          LOOP_TOKEN: ${{ secrets.LOOP_TOKEN }}
          REPO:       ${{ github.repository }}
        run: |
          if [ -z "$LOOP_TOKEN" ]; then
            echo "⚠️  LOOP_TOKEN is not set — loop will NOT continue."
            echo "    Set LOOP_TOKEN secret (GitHub PAT with repo scope) to enable the self-triggering loop."
            exit 0
          fi

          echo "🔁 Triggering next check cycle..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $LOOP_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/dispatches" \
            -d '{"event_type":"tiktok-live-check"}')

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ Next iteration triggered successfully."
          else
            echo "❌ Failed to trigger next iteration (HTTP $HTTP_STATUS)."
            exit 1
          fi

  # ── Keepalive: mencegah GitHub menonaktifkan scheduled workflow ───────────
  # GitHub menonaktifkan scheduled workflow setelah 60 hari tanpa aktivitas.
  # Job ini berjalan setiap kali cron schedule terpicu dan mengaktifkan ulang
  # workflow jika GitHub menandainya sebagai disabled.
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
